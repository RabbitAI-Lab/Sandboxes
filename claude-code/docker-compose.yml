version: "3.8"

services:
  claude-code:
    image: ghcr.io/rabbitai-lab/claude-code:latest
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: claude-code
    ports:
      - "2468:2468"
    restart: unless-stopped
    volumes:
      - workspace:/workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2468 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  workspace:
    driver: local
