name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "claude-code/**"
      - ".github/workflows/build.yml"
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed images
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            images=$(ls -d */ | sed 's/\///' | tr '\n' ' ')
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            images=$(ls -d */ | sed 's/\///' | tr '\n' ' ')
          else
            if [ "$(git rev-list --count HEAD)" -lt 2 ]; then
              images=$(ls -d */ | sed 's/\///' | tr '\n' ' ')
            else
              images=$(git diff --name-only HEAD~1 HEAD | grep -oP '^[^/]+(?=/)' | sort -u | grep -v '.github' | tr '\n' ' ')
            fi
          fi
          echo "images=$images" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        if: steps.detect.outputs.images != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        if: steps.detect.outputs.images != ''
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for image in ${{ steps.detect.outputs.images }}; do
            echo "::group::Building $image"
            TAGS="${{ env.REGISTRY }}/${OWNER}/${image}:latest,${{ env.REGISTRY }}/${OWNER}/${image}:sha-${GITHUB_SHA:0:7}"
            if [ "${{ github.ref_type }}" = "tag" ]; then
              TAGS="${TAGS},${{ env.REGISTRY }}/${OWNER}/${image}:${{ github.ref_name }}"
            fi
            docker build -t "${{ env.REGISTRY }}/${OWNER}/${image}:latest" "$image"
            for tag in $(echo "$TAGS" | tr ',' '\n'); do
              docker tag "${{ env.REGISTRY }}/${OWNER}/${image}:latest" "$tag"
              docker push "$tag"
            done
            echo "::endgroup::"
          done
