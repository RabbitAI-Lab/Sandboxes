name: Build dev-box

on:
  push:
    branches: [main]
    paths:
      - "dev-box/**"
      - ".github/workflows/build-dev-box.yml"
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dev-box

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAGS="${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA:0:7}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          fi
          docker build -t "${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:latest" dev-box
          for tag in $(echo "$TAGS" | tr ',' '\n'); do
            docker tag "${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:latest" "$tag"
            docker push "$tag"
          done
